services:
  - type: web
    name: icon-ads-backend
    env: node
    rootDir: icon-ads-backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DIRECT_URL
        sync: false
      - key: FRONTEND_URL
        value: https://icon-ads.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
